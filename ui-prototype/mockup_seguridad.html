<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENDA URJC — Panel de Seguridad</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --urjc-red: #CB0017;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --bg-gray: #F3F4F6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #EAEBE9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .phone-frame {
            width: 390px;
            height: 844px;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #000;
            color: white;
            padding: 54px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 16px;
            gap: 10px;
        }

        .header-logo { height: 24px; }

        .status-badge {
            background: #10B981;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-badge.active::before {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            display: block;
        }

        /* Emergency Alert Banner */
        .emergency-banner {
            background: var(--urjc-red);
            color: white;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(203, 0, 23, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(203, 0, 23, 0); }
            100% { box-shadow: 0 0 0 0 rgba(203, 0, 23, 0); }
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .alert-header svg { width: 20px; height: 20px; fill: white; }

        .victim-name { font-size: 20px; font-weight: 800; }
        .alert-desc { font-size: 13px; opacity: 0.9; }

        /* Map */
        .map-wrapper {
            flex: 1;
            position: relative;
        }

        #map { width: 100%; height: 100%; }

        /* Bottom Controls */
        .bottom-panel {
            background: white;
            padding: 24px 20px;
            border-radius: 24px 24px 0 0;
            margin-top: -24px;
            z-index: 10;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .info-value { font-weight: 700; color: var(--text-primary); }
        .info-label { color: var(--text-secondary); }

        .btn {
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--urjc-red);
            color: white;
            box-shadow: 0 4px 12px rgba(203, 0, 23, 0.3);
        }

        .btn-secondary {
            background: var(--bg-gray);
            color: var(--text-primary);
        }
        
        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <div class="header-top">
                <div class="header-title">
                    <img class="header-logo" src="assets/URJC_Simbolos/URJ_simbolo_BN_NEG.png" alt="URJC">
                    Seguridad Campus
                </div>
                <div class="status-badge active">De Guardia</div>
            </div>

            <div class="emergency-banner">
                <div class="alert-header">
                    <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22M12 6l7.53 13H4.47M11 10v4h2v-4m-2 6v2h2v-2"/></svg>
                    Alerta SOS Recibida
                </div>
                <div class="victim-name">María García Pérez</div>
                <div class="alert-desc">Desvío de ruta detectado + Falta de respuesta al temporizador de seguridad.</div>
            </div>
        </div>

        <div class="map-wrapper">
            <div id="map"></div>
        </div>

        <div class="bottom-panel">
            <div class="info-row">
                <span class="info-label">Distancia a la víctima</span>
                <span class="info-value">350 m (aprox. 3 min)</span>
            </div>
            <div class="info-row">
                <span class="info-label">Última actualización</span>
                <span class="info-value">Hace 15 segundos</span>
            </div>
            
            <button class="btn btn-primary">
                Acudir Inmediatamente
            </button>
            <button class="btn btn-secondary">
                Derivar aviso al 112
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false}).setView([40.33610, -3.87600], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // Victim marker
        const victimIcon = L.divIcon({
            html: '<div style="width:24px;height:24px;background:#CB0017;border-radius:50%;border:4px solid white;box-shadow:0 0 0 6px rgba(203,0,23,0.3), 0 4px 10px rgba(0,0,0,0.2); animation: pulse-border 2s infinite;"></div>',
            className: '',
            iconSize: [24,24],
            iconAnchor: [12,12]
        });
        L.marker([40.33650, -3.87550], { icon: victimIcon }).addTo(map);

        // Security Guard marker
        const guardIcon = L.divIcon({
            html: '<div style="width:20px;height:20px;background:#10B981;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2);"></div>',
            className: '',
            iconSize: [20,20],
            iconAnchor: [10,10]
        });
        L.marker([40.33500, -3.87700], { icon: guardIcon }).addTo(map);

        // Route line
        L.polyline([
            [40.33500, -3.87700],
            [40.33550, -3.87650],
            [40.33600, -3.87600],
            [40.33650, -3.87550]
        ], { color: '#3B82F6', weight: 4, dashArray: '8, 8' }).addTo(map);
    </script>
    <script src="demo-flow.js"></script>
</body>
</html>

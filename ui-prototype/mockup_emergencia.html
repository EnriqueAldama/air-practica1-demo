<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENDA URJC — Emergencia Activa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F3F4F6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .phone-frame {
            width: 390px;
            height: 844px;
            background: #CB0017; /* URJC Red */
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(203,0,23, 0.4), 0 0 0 1px rgba(0,0,0,0.08);
            position: relative;
            display: flex;
            flex-direction: column;
            color: white;
            text-align: center;
            animation: pulseBg 2s infinite;
        }

        @keyframes pulseBg {
            0%, 100% { background: #CB0017; }
            50% { background: #9E0012; }
        }

        .status-bar {
            height: 54px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 28px 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .alert-icon {
            margin: 60px auto 20px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert-icon svg { width: 50px; height: 50px; fill: white; }

        .pre-alert-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pre-alert-desc {
            font-size: 16px;
            opacity: 0.9;
            padding: 0 30px;
            margin-bottom: 40px;
        }

        .timer-container {
            margin: 20px auto 50px;
            position: relative;
            width: 180px;
            height: 180px;
        }

        .timer-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 12px solid rgba(255,255,255,0.3);
            border-top-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: 800;
        }

        .action-area {
            margin-top: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(0,0,0,0.1);
            border-radius: 40px 40px 0 0;
        }

        .btn-safe {
            background: #10B981; /* Green active */
            color: white;
            font-size: 22px;
            font-weight: 800;
            padding: 14px 24px 30px 24px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
            text-transform: uppercase;
        }

        .btn-cancel {
            background: transparent;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            font-weight: 600;
            border: none;
            text-decoration: underline;
            padding: 10px;
            cursor: pointer;
        }
        
        .haptic-indicator {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>17:45</span>
            <span>●●●●○ WiFi 🔋</span>
        </div>

        <div class="alert-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22M12 6l7.53 13H4.47M11 10v4h2v-4m-2 6v2h2v-2"/></svg>
        </div>

        <div class="pre-alert-title">¿Estás bien?</div>
        <div class="pre-alert-desc">Hemos detectado una detención inusual en tu trayecto.</div>

        <div class="timer-container">
            <div class="timer-circle"></div>
            <div class="timer-text"><p id="demo">29</p></div>
        </div>
        
        <div class="haptic-indicator">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M4 4h16v16H4z" opacity="0.3"/><path d="M10 21h4a2 2 0 002-2V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v14a2 2 0 002 2zm1-17h2v1h-2V4zm-2 2h6v11H9V6zm2 13h2v1h-2v-1z"/></svg>
            Vibración de alta prioridad activa
        </div>

        <div class="action-area">
            <button class="btn-safe">
                ¡Estoy bien!
            </button>
            <button class="btn-cancel">Enviar alerta SOS ahora</button>
        </div>
    </div>
    <script src="demo-flow.js"></script>
</body>
</html>
